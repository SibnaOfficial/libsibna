# cargo-deny configuration
# Run: cargo deny check

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]

# ─── License policy ──────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
]
copyleft = "deny"
confidence-threshold = 0.8

# ─── Security advisories ─────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = []

# ─── Dependency bans ─────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Insecure or unmaintained crypto
    { name = "md5" },
    { name = "sha1" },
    { name = "des" },
    { name = "rc4" },
    { name = "crypto" },
    # Avoid old rand versions
    { name = "rand", version = "<0.8" },
]
skip-tree = []

# ─── Source policy ───────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
