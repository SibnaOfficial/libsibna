name: sibna_protocol
description: Ultra-Secure Communication Protocol - Dart/Flutter SDK
version: 8.0.0
homepage: https://github.com/sibna/protocol
repository: https://github.com/sibna/protocol
documentation: https://docs.sibna.dev

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  ffi: ^2.1.0
  path: ^1.8.3
  crypto: ^3.0.3
  convert: ^3.1.1
  synchronized: ^3.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  test: ^1.24.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.sibna.protocol
        pluginClass: SibnaProtocolPlugin
      ios:
        pluginClass: SibnaProtocolPlugin
      linux:
        pluginClass: SibnaProtocolPlugin
      macos:
        pluginClass: SibnaProtocolPlugin
      windows:
        pluginClass: SibnaProtocolPlugin

topics:
  - cryptography
  - encryption
  - security
  - signal
  - e2ee
